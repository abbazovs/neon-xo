version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: neonxo-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neonxo
    ports:
      - '5432:5432'
    volumes:
      - neonxo_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neonxo-redis
    ports:
      - '6379:6379'
    volumes:
      - neonxo_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  neonxo_pg_data:
  neonxo_redis_data:
